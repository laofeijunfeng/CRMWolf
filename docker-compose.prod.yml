# docker-compose.prod.yml - 完整生产环境配置（自包含）
# 使用场景：全新部署，包含数据库和缓存
# 使用方式：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: crm-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: crm_db
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    secrets:
      - db_password
    networks:
      - crm-internal

  redis:
    image: redis:6-alpine
    container_name: crm-redis-prod
    restart: always
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - crm-internal

  backend:
    extends:
      file: docker-compose.yml
      service: backend
    container_name: crm-backend-prod
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_NAME: crm_db
      DB_PASSWORD_FILE: /run/secrets/db_password
      SECRET_KEY_FILE: /run/secrets/secret_key
      REDIS_HOST: redis
      CRM_DEBUG: "false"
      # 前端应用地址（用于飞书通知跳转链接）
      FRONTEND_URL: ${FRONTEND_URL:-http://8.134.219.103}
      SMTP_PROVIDER: ${SMTP_PROVIDER:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - db_password
      - secret_key
    networks:
      - crm-internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    extends:
      file: docker-compose.yml
      service: frontend
    container_name: crm-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    networks:
      - crm-internal
      - crm-public
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mysql_prod_data:
    driver: local
  redis_prod_data:
    driver: local

secrets:
  db_password:
    file: ./secrets/db_password.txt
  secret_key:
    file: ./secrets/secret_key.txt

networks:
  crm-internal:
    internal: true
  crm-public: