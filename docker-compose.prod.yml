version: '3.8'

# 生产环境配置
# 使用方式: docker-compose -f docker-compose.prod.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: crm-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: crm_db
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    secrets:
      - db_password
    networks:
      - crm-internal

  redis:
    image: redis:6-alpine
    container_name: crm-redis-prod
    restart: always
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - crm-internal
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./CRM-Server
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: production
    container_name: crm-backend-prod
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_NAME: crm_db
      DB_PASSWORD_FILE: /run/secrets/db_password
      SECRET_KEY_FILE: /run/secrets/secret_key
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 5
      CRM_DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - ./uploads:/app/uploads
    secrets:
      - secret_key
      - db_password
    networks:
      - crm-internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./CRM-Client
      dockerfile: Dockerfile
    container_name: crm-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - crm-internal
      - crm-public
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mysql_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  backend_logs:
    driver: local

secrets:
  db_password:
    file: ./secrets/db_password.txt
  secret_key:
    file: ./secrets/secret_key.txt

networks:
  crm-internal:
    internal: true
  crm-public: