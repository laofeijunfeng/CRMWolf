# docker-compose.yml - 基础服务定义（所有环境共享）
# 此文件不单独使用，需配合环境特定配置：
#   - 本地开发：docker-compose.yml + docker-compose.override.yml（自动合并）
#   - 服务器部署：docker-compose.yml + docker-compose.server.yml
#   - 完整生产：docker-compose.yml + docker-compose.prod.yml

services:
  backend:
    image: crm-backend:${IMAGE_TAG:-amd64}
    container_name: crm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_PORT: 3306
      REDIS_PORT: 6379
      REDIS_DB: 5
      CRM_DEBUG: ${CRM_DEBUG:-false}
    volumes:
      - backend_logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: crm-frontend:${IMAGE_TAG:-amd64}
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_logs:
    driver: local