version: '3.8'

services:
  # 后端 API 服务
  backend:
    image: crm-backend:amd64
    container_name: crm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 数据库配置（使用同网络容器名访问）
      DB_HOST: mysql8
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: "DA2zGezRm0NPFnqJvs55"
      DB_NAME: crm_db
      SECRET_KEY: MbYbcwzfpsq5y5WUoecr9gjd5qV5Wd2V
      REDIS_HOST: redis6
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 5
      CRM_DEBUG: ${CRM_DEBUG:-false}
      # 邮件配置（可选）
      SMTP_PROVIDER: ${SMTP_PROVIDER:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  # 前端 Nginx 服务
  frontend:
    image: crm-frontend:amd64
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

networks:
  default:
    name: crmwolf-network